name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        homeassistant:
          - "2026.6.0"
          - "2026.7.2"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install -r requirements_test.txt
          python -m pip install "homeassistant==${{ matrix.homeassistant }}"
      - name: Lint
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .
      - name: Test
        run: pytest
      - name: Validate JSON and Python syntax
        run: |
          python -m compileall -q custom_components
          python -m json.tool hacs.json >/dev/null
          python -m json.tool custom_components/ha_tion_btle/manifest.json >/dev/null
          python -m json.tool custom_components/ha_tion_btle/translations/en.json >/dev/null

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hacs/action@main
        with:
          category: integration
